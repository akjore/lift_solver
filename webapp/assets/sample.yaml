meta:
  name: "Compressor A Removal"
  units:
    length: m
    force: kN
  frame: global

environment:
  gravity: [0.0, 0.0, -9.81]

# ----------------------------------------------------------
# Bodies
# ----------------------------------------------------------
bodies:

  load:
    mass: 108   # t

    # --- Local definition ---
    cog: [50.562, 277.097, 550.428]

    points:   # ref. drawing from Nuovo Pignone
      lp1: [46.252, 279.542, 549.398]
      lp2: [46.252, 274.742, 549.398]
      lp3: [53.412, 279.542, 549.398]
      lp4: [53.412, 274.742, 549.398]

    # --- Global placement ---
    pose:
      position: [-50.562, -277.097, -550.428]
      orientation: [0.0, 0.0, 0.0]   # Euler (for now)

    # --- Optional visual representation ---
    visual:
      type: box
      size: [14.5, 4.4, 6.1]   # length, width, height
      offset: [49.832, 277.097, 550.428]        # relative to body local origin
      color: 0x888888
      opacity: 0.2

  spreader:
    mass: 1.2   # t

    # --- Local definition ---
    cog: [0.0, 0.0, 0.0]

    points:
      left_lower:  [-2.590, 0.0, -0.350]
      left_upper:  [-2.430, 0.0,  0.350]
      right_lower: [ 2.590, 0.0, -0.350]
      right_upper: [ 2.430, 0.0,  0.350]

    # --- Global placement ---
    pose:
      position: [0.0, 0.0, 10.0]
      orientation: [0.0, 0.0, -90.0]

    # --- Optional visual representation ---
    visual:
      type: cylinder
      radius: 0.15
      length: 5.680
      axis: x       # important for orientation
      color: 0x0066cc

  hook:
    mass: 0

    cog: [0.0, 0.0, 0.0]

    points:
      hook: [0.0, 0.0, 0.0]

    pose:
      position: [0.0, 0.0, 25.0]
      orientation: [0.0, 0.0, 0.0]

# ----------------------------------------------------------
# Elements
# ----------------------------------------------------------
elements:

  - id: SL1
    from: load.lp1
    to:   spreader.left_lower
    L0: 9.269 # m
    EA: 5900  # kN/m

  - id: SL2
    from: load.lp2
    to:   spreader.right_lower
    L0: 9.269
    EA: 5900

  - id: SL3
    from: load.lp3
    to:   spreader.left_lower
    L0: 8.669
    EA: 6200

  - id: SL4
    from: load.lp4
    to:   spreader.right_lower
    L0: 8.669
    EA: 6200

  - id: sling_5
    from: spreader.left_upper
    to:   hook.hook
    L0: 13.830
    EA: 9400

  - id: sling_6
    from: spreader.right_upper
    to:   hook.hook
    L0: 13.830
    EA: 9400

# ----------------------------------------------------------
# Constraints
# ----------------------------------------------------------
constraints:

  hook:
    fix:
      translation: [true, true, true]
      rotation:    [true, true, true]

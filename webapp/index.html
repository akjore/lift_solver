<!DOCTYPE html>
<html>
<head>
  <title>LiftSolver Prototype</title>
</head>
<body>

  <h1>LiftSolver</h1>

  <!-- Upload -->
  <input type="file" id="fileInput" accept=".yaml,.yml" />

  <!-- Actions -->
  <button id="solveBtn">Run Solver</button>

  <!-- Display -->
<!--  <pre id="output"></pre> -->

  <!-- Canvas (for later rendering) -->
  <div id="canvas" style="width: 100%; height: 600px;"></div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.152/build/three.module.js"
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/STLLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/TrackballControls.js"></script>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>


  <script type="module" src="js/app.js"></script>



</body>
</html>
